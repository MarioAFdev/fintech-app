version: '3.8'

services:
  webserver:
    image: php:8.2-apache
    container_name: fintech_webserver
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html/backend
      - ./frontend:/var/www/html/frontend
    depends_on:
      - database
    build:
      context: .
      dockerfile: Dockerfile

  database:
    image: mysql:8.0
    container_name: fintech_database
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: fintech_db
      MYSQL_USER: fintech_user
      MYSQL_PASSWORD: fintech_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: fintech_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: database
      PMA_PORT: 3306
    depends_on:
      - database

volumes:
  db_data: